<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MewWallet — Send</title>
    <style>
        :root {
            --accent: #a855f7;
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); 
            color: var(--text); font-family: 'Inter', -apple-system, sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .app-shell {
            width: 100%; max-width: 420px; 
            background: radial-gradient(circle at top left, #1a1033 0%, #000000 40%);
            min-height: 100vh; display: flex; flex-direction: column; padding: 20px;
        }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-link { color: var(--text); text-decoration: none; font-size: 24px; width: 40px; transition: 0.2s; }
        .back-link:active { opacity: 0.5; }
        .title { font-size: 18px; font-weight: 700; flex: 1; text-align: center; }

        /* Amount Input */
        .amount-section { text-align: center; margin-bottom: 30px; }
        .amount-input-wrapper { display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .amount-input {
            background: transparent; border: none; color: white; font-size: 52px;
            font-weight: 800; width: 100%; max-width: 250px; text-align: center; outline: none;
        }

        /* Скрываем стрелки */
        .amount-input::-webkit-outer-spin-button,
        .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .amount-input[type=number] { -moz-appearance: textfield; }

        .currency { font-size: 24px; color: var(--accent); font-weight: 700; margin-top: 10px; }
        .available-balance { 
            color: var(--text-dim); font-size: 14px; margin-top: 5px; cursor: pointer; 
            transition: 0.2s; display: inline-block; padding: 5px 10px;
        }
        .available-balance:active { color: white; transform: scale(0.95); }

        /* Input Fields */
        .input-group { margin-bottom: 20px; }
        .label { display: block; color: var(--text-dim); font-size: 11px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        
        .input-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .input-box:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .input-box input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 16px; }
        .qr-btn { cursor: pointer; opacity: 0.8; transition: 0.2s; width: 24px; height: 24px; }
        .qr-btn:active { transform: scale(0.9); }

        /* Details Card */
        .details-card {
            background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 30px; border: 1px solid var(--border);
        }
        .detail-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
        .detail-row:last-child { margin-bottom: 0; }
        .detail-label { color: var(--text-dim); }
        .detail-value { font-weight: 700; color: #fff; }

        /* Main Button */
        .send-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
            color: white; border: none; padding: 22px; border-radius: 24px;
            font-weight: 800; font-size: 18px; cursor: pointer;
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.25);
            margin-top: auto; transition: 0.3s;
        }
        .send-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card {
            background: linear-gradient(145deg, #1e1e1e, #121212);
            border: 1px solid var(--border); padding: 30px; border-radius: 32px;
            width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transform: translateY(20px); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-card { transform: translateY(0); }
        .modal-icon { font-size: 44px; margin-bottom: 15px; }
        .modal-card h3 { margin: 0 0 10px; font-size: 22px; color: #fff; }
        .modal-card p { color: var(--text-dim); font-size: 15px; line-height: 1.5; margin-bottom: 25px; padding: 0 10px; }
        .modal-btn {
            background: var(--accent); color: white; border: none;
            padding: 16px; border-radius: 18px; font-weight: 700;
            cursor: pointer; width: 100%; transition: 0.2s; font-size: 16px;
        }
        .modal-btn:active { transform: scale(0.95); background: #7c3aed; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header">
            <a href="mainWallet.html" class="back-link">←</a>
            <div class="title">Send Assets</div>
            <div style="width: 40px;"></div>
        </div>

        <div class="amount-section">
            <div class="amount-input-wrapper">
                <input type="number" class="amount-input" id="amount" placeholder="0" oninput="updateFee()" step="any">
                <span class="currency">MEW</span>
            </div>
            <div class="available-balance" id="available" onclick="setMax()">Balance: 0.00 MEW</div>
        </div>

        <div class="input-group">
            <span class="label">Recipient Address</span>
            <div class="input-box">
                <input type="text" id="recipient" placeholder="Mew_address...">
                <img src="img/get.png" class="qr-btn" onclick="showModal('Scanner', 'QR scanner will be available in the next update!')">
            </div>
        </div>

        <div class="details-card">
            <div class="detail-row">
                <span class="detail-label">Network Fee</span>
                <span class="detail-value" id="fee">0.001 MEW</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Transfer Time</span>
                <span class="detail-value">Instant</span>
            </div>
        </div>

        <button class="send-btn" onclick="sendTransaction()">Send Now</button>
    </div>

    <div id="mew-modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-icon">🐾</div>
            <h3 id="modal-title">Notification</h3>
            <p id="modal-message">Message text goes here...</p>
            <button class="modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const myAddress = localStorage.getItem('mew_address') || "Guest";
        let currentBalance = 0;

        function showModal(title, message, isError = false) {
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-message');
            const iconEl = document.querySelector('.modal-icon');
            const overlay = document.getElementById('mew-modal-overlay');

            titleEl.innerText = title;
            msgEl.innerText = message;
            iconEl.innerText = isError ? "❌" : "🐾";
            titleEl.style.color = isError ? "#ef4444" : "#fff";

            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        function closeModal() {
            const overlay = document.getElementById('mew-modal-overlay');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        async function loadBalance() {
            try {
                const res = await fetch(`${API_URL}/balance/${myAddress}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                currentBalance = parseFloat(data.balance);
                document.getElementById('available').innerText = `Balance: ${currentBalance.toFixed(2)} MEW`;
            } catch (e) {
                showModal("Sync Error", "Could not update balance from node.", true);
            }
        }

        function setMax() {
            const fee = 0.001;
            if (currentBalance > fee) {
                document.getElementById('amount').value = (currentBalance - fee).toFixed(4);
                updateFee();
            } else {
                showModal("Low Balance", "Insufficient funds for fee.");
            }
        }

        function updateFee() {
            const amount = document.getElementById('amount').value;
            const calcFee = amount ? Math.max(0.001, amount * 0.001).toFixed(4) : "0.001";
            document.getElementById('fee').innerText = `${calcFee} MEW`;
        }

        async function sendTransaction() {
            const recipient = document.getElementById('recipient').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);

            if (!recipient || !amount || amount <= 0) {
                return showModal("Invalid Input", "Check recipient and amount.", true);
            }
            if (amount + 0.001 > currentBalance) {
                return showModal("Insufficient Funds", "Not enough MEW.", true);
            }

            try {
                const res = await fetch(`${API_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: myAddress, receiver: recipient, amount: amount })
                });

                if (res.ok) {
                    showModal("Success!", "Transaction submitted!");
                    setTimeout(() => window.location.href = 'mainWallet.html', 1500);
                } else {
                    const err = await res.json();
                    showModal("Failed", err.error || "Node rejected transaction.", true);
                }
            } catch (e) {
                showModal("Network Error", "Connection to MewChain failed.", true);
            }
        }

        document.addEventListener('DOMContentLoaded', loadBalance);
    </script>
</body>
</html>
