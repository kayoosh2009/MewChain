<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MewChain - Create</title>
    <style>
        :root {
            --accent: #A89BF2;
            --bg: #050505;
            --text: #FFFFFF;
            --text-dim: #666666;
            --card: #121212;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-viewport {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: var(--safe-top) 24px var(--safe-bottom) 24px;
            box-sizing: border-box;
        }

        .header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn { color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            text-align: left;
        }

        h1 { font-size: 32px; font-weight: 800; margin: 0 0 12px 0; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 30px; }

        /* Сетка для мнемоники */
        .mnemonic-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #1a1a1a;
            box-sizing: border-box;
        }

        .word-chip {
            background: #000;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            color: var(--accent);
            text-align: center;
            font-family: monospace;
            border: 1px solid #1a1a1a;
        }

        .word-chip span { color: #444; margin-right: 5px; font-size: 10px; }

        .footer-actions {
            width: 100%;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: block;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .btn-primary { background-color: var(--accent); color: var(--bg); }
        .btn-secondary { background-color: transparent; color: var(--accent); border: 2px solid var(--accent); }
        .btn:active { transform: scale(0.96); }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 30px;
            z-index: 100;
        }

        .modal {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid #222;
        }

        .modal h2 { margin-top: 0; color: var(--accent); }
    </style>
</head>
<body>

    <div class="mobile-viewport">
        <div class="header">
            <a href="index.html" class="back-btn">← BACK</a>
        </div>

        <div class="main-content">
            <h1>Secret Phrase</h1>
            <p class="subtitle">Write down or copy these 12 words. This is the ONLY way to recover your wallet.</p>
            
            <div class="mnemonic-grid" id="mnemonicContainer">
                </div>
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" onclick="copyMnemonic()">Copy to Clipboard</button>
            <button class="btn btn-primary" onclick="showConfirm()">Continue</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Are you sure?</h2>
            <p class="subtitle">If you lose these words, your funds will be lost forever. Have you really saved them?</p>
            <button class="btn btn-primary" onclick="finalStep()">Yes, I saved them</button>
            <button class="btn btn-secondary" style="margin-top:10px; border:none;" onclick="hideConfirm()">Go back</button>
        </div>
    </div>

    <script>
        // Список слов (в идеале тянется с бэкенда или генерится библиотекой)
        const demoWords = ["cat", "crypto", "mew", "node", "chain", "digital", "future", "wallet", "block", "secure", "alpha", "asset"];
        let generatedAddress = "";
        let generatedSecret = "";

        function init() {
            const container = document.getElementById('mnemonicContainer');
            demoWords.forEach((word, index) => {
                container.innerHTML += `<div class="word-chip"><span>${index + 1}</span>${word}</div>`;
            });
            
            // Сразу запрашиваем реальный адрес у бэкенда Rust
            fetch('/wallet/new')
                .then(res => res.json())
                .then(data => {
                    generatedAddress = data.address;
                    generatedSecret = data.secret_key;
                });
        }

        function copyMnemonic() {
            const text = demoWords.join(" ");
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }

        function showConfirm() {
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function hideConfirm() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function finalStep() {
            // Сохраняем данные в localStorage в виде "сессии"
            // В продакшене тут должен быть захешированный объект
            const session = {
                address: generatedAddress,
                sk: generatedSecret,
                isLoggedIn: true,
                timestamp: Date.now()
            };
            
            localStorage.setItem('mew_session', btoa(JSON.stringify(session))); // Базовое "хеширование" через Base64 для примера
            window.location.href = 'mainWallet.html';
        }

        init();
    </script>
</body>
</html>
