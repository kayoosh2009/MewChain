<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MewWallet — Import</title>
    <style>
        :root {
            --accent: #a855f7;
            --bg: #000000;
            --card: #121212;
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg);
            color: var(--text); font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .app-shell {
            width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
            display: flex; flex-direction: column; padding: 30px;
        }

        .header { margin-bottom: 30px; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 14px; }

        h1 { font-size: 32px; font-weight: 800; margin: 10px 0; }
        p { color: #888; font-size: 16px; margin-bottom: 30px; }

        .import-container {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        textarea::placeholder { color: #444; }

        .info-text {
            font-size: 13px;
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-main {
            background-color: var(--accent);
            color: #fff;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: auto;
        }

        .btn-main:active { transform: scale(0.97); }
        .btn-main:disabled { background-color: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header">
            <a href="index.html" class="back-btn">← Back</a>
        </div>

        <h1>Import Wallet</h1>
        <p>Enter your 12 or 24 secret words separated by spaces.</p>

        <div class="import-container">
            <textarea id="seed-input" placeholder="word1 word2 word3..." oninput="validateForm()"></textarea>
        </div>

        <p class="info-text">Typically 12 words for MewWallet accounts.</p>

        <button class="btn-main" id="import-btn" onclick="processImport()" disabled>Import Assets</button>
    </div>

    <script>
        const input = document.getElementById('seed-input');
        const btn = document.getElementById('import-btn');

        // --- СИСТЕМА МАСКИРОВКИ (MewVault) ---
        const MewVault = {
            salt: "mew_v1_",
            save: (key, value) => {
                localStorage.setItem(key, btoa(MewVault.salt + value));
            }
        };

        function validateForm() {
            const words = input.value.trim().split(/\s+/);
            if (words.length === 12 || words.length === 24) {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        function processImport() {
            const seed = input.value.trim();
            
            // Генерируем временный адрес на основе фразы для отображения
            // (Base64 от фразы, чтобы получить уникальную строку Mew_...)
            const derivedAddress = "Mew_" + btoa(seed).substring(0, 10);

            // Сохраняем замаскированные данные
            MewVault.save('mew_address', derivedAddress);
            MewVault.save('mew_phrase', seed);

            window.location.href = 'mainWallet.html';
        }
    </script>
</body>
</html>
