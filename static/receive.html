<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MewWallet — Receive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --accent: #a855f7;
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); 
            color: var(--text); font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        .app-shell {
            width: 100%; max-width: 420px; 
            background: radial-gradient(circle at bottom left, #1a1033 0%, #000000 50%);
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; padding: 40px 20px;
        }

        .title { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 40px; }

        /* Контейнер для QR */
        .qr-container {
            background: #fff; /* Белый фон для считываемости QR */
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #qrcode img {
            max-width: 100%;
            height: auto;
        }

        /* Поле адреса */
        .address-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
        }
        .address-box:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        
        .address-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .address-text { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 15px; 
            color: var(--accent);
            word-break: break-all;
            font-weight: 700;
        }

        /* Кнопка "Хорошо" */
        .ok-btn {
            background: var(--card);
            color: white;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 24px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
            transition: 0.3s;
        }
        .ok-btn:hover { border-color: var(--accent); }
        .ok-btn:active { transform: scale(0.96); background: var(--accent); }

        /* Кастомное уведомление о копировании */
        #copy-toast {
            position: fixed; bottom: 100px; background: var(--accent);
            color: white; padding: 10px 25px; border-radius: 20px;
            font-weight: 700; font-size: 14px; opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #copy-toast.active { opacity: 1; transform: translateY(-20px); }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="title">Receive MEW</div>
        <div class="subtitle">Scan to send assets to this wallet</div>

        <div class="qr-container">
            <div id="qrcode"></div>
        </div>

        <div class="address-box" onclick="copyAddress()">
            <div class="address-label">Your Wallet Address</div>
            <div class="address-text" id="wallet-addr">Mew_Loading...</div>
        </div>

        <div id="copy-toast">Address Copied! 🐾</div>

        <button class="ok-btn" onclick="window.location.href='mainWallet.html'">Хорошо</button>
    </div>

    <script>
        const myAddress = localStorage.getItem('mew_address') || "Mew_Unknown_User";
        document.getElementById('wallet-addr').innerText = myAddress;

        // Генерация QR
        new QRCode(document.getElementById("qrcode"), {
            text: myAddress,
            width: 240,
            height: 240,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Функция копирования
        function copyAddress() {
            navigator.clipboard.writeText(myAddress);
            
            const toast = document.getElementById('copy-toast');
            toast.classList.add('active');
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2000);
        }
    </script>
</body>
</html>
