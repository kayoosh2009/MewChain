<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MewWallet — More</title>
    <style>
        :root {
            --accent: #a855f7;
            --bg: #000000;
            --card: #121212;
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #888;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg); 
            color: var(--text); font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .app-shell {
            width: 100%; max-width: 420px; 
            display: flex; flex-direction: column; padding: 25px;
            background: radial-gradient(circle at bottom right, #1a1033 0%, #000000 40%);
        }

        .header { display: flex; align-items: center; margin-bottom: 35px; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 20px; margin-right: 15px; }
        h1 { font-size: 24px; font-weight: 800; margin: 0; }

        /* Список меню */
        .menu-list { display: flex; flex-direction: column; gap: 12px; }

        .menu-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.2s;
            cursor: pointer;
        }

        .menu-item:active { transform: scale(0.98); background: rgba(255,255,255,0.05); }

        .menu-icon {
            width: 42px;
            height: 42px;
            margin-right: 15px;
            object-fit: contain;
        }

        .menu-text { font-size: 16px; font-weight: 600; flex: 1; }
        .menu-arrow { color: var(--text-dim); font-size: 18px; }

        /* Специальный стиль для выхода */
        .menu-item.logout { border-color: rgba(255, 68, 68, 0.2); }
        .menu-item.logout .menu-text { color: var(--danger); }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header">
            <a href="mainWallet.html" class="back-btn">←</a>
            <h1>Other</h1>
        </div>

        <div class="menu-list">
            <a href="miner.html" class="menu-item">
                <img src="img/miner.png" alt="Miner" class="menu-icon">
                <span class="menu-text">Mine in MewChain</span>
                <span class="menu-arrow">›</span>
            </a>

            <a href="faq.html" class="menu-item">
                <img src="img/faq.png" alt="FAQ" class="menu-icon">
                <span class="menu-text">FAQ's</span>
                <span class="menu-arrow">›</span>
            </a>

            <div class="menu-item logout" onclick="logout()">
                <img src="img/exit.png" alt="Exit" class="menu-icon">
                <span class="menu-text">Exit the account</span>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            if (confirm("Вы уверены, что хотите выйти? Убедитесь, что ваша сид-фраза сохранена!")) {
                // Полная очистка данных кошелька
                localStorage.removeItem('mew_address');
                localStorage.removeItem('mew_phrase');
                localStorage.removeItem('mew_staked_balance');
                
                // Возврат на экран приветствия
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
