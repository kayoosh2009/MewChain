<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MewWallet — Staking</title>
    <style>
        :root {
            --accent: #a855f7;
            --bg: #000000;
            --card: #121212;
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #888;
            --error: #ff4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg); 
            color: var(--text); font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .app-shell {
            width: 100%; max-width: 420px; 
            display: flex; flex-direction: column; padding: 25px;
            background: radial-gradient(circle at top right, #1a1033 0%, #000000 40%);
        }

        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 20px; margin-right: 15px; }
        h1 { font-size: 24px; font-weight: 800; margin: 0; }

        /* Блок активного стейкинга */
        .status-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; margin-bottom: 25px;
        }
        .label { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 32px; font-weight: 800; margin: 10px 0; color: var(--accent); }
        .sub-value { font-size: 15px; color: #22c55e; font-weight: 600; }

        /* Блок ввода в стейкинг */
        .action-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px;
        }
        h2 { font-size: 18px; margin: 0 0 20px 0; }

        .input-group { position: relative; margin-bottom: 10px; }
        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            border-radius: 16px; padding: 18px; color: #fff; font-size: 18px;
            font-family: 'JetBrains Mono', monospace; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .fee-info { font-size: 12px; color: var(--text-dim); margin-top: 8px; display: flex; justify-content: space-between; }

        .btn {
            width: 100%; padding: 18px; border-radius: 18px; font-size: 16px;
            font-weight: 700; border: none; cursor: pointer; transition: 0.2s; margin-top: 20px;
        }
        .btn-withdraw { background: transparent; border: 1px solid var(--border); color: #fff; }
        .btn-stake { background: var(--accent); color: #fff; box-shadow: 0 8px 20px rgba(168, 85, 247, 0.2); }
        
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header">
            <a href="mainWallet.html" class="back-btn">←</a>
            <h1>Staking</h1>
        </div>

        <div class="status-card">
            <div class="label">Количество застейканных Mew</div>
            <div class="value" id="staked-amount">0.00</div>
            
            <div class="label" style="margin-top: 20px;">Заработок за 365 дней (7% APY)</div>
            <div class="sub-value" id="yearly-profit">+0.00 MEW</div>

            <button class="btn btn-withdraw" onclick="withdraw()">Вывести</button>
        </div>

        <div class="action-card">
            <h2>Ввести в стейкинг</h2>
            <div class="input-group">
                <input type="number" id="stake-input" placeholder="0.00" oninput="calculateFee()">
            </div>
            <div class="fee-info">
                <span>Комиссия: 2.5%</span>
                <span id="fee-value">0.00 MEW</span>
            </div>
            <button class="btn btn-stake" onclick="stake()">Ввести в стейкинг</button>
        </div>
    </div>

    <script>
        // Система маскировки данных (MewVault)
        const MewVault = {
            salt: "mew_v1_",
            get: (key) => {
                const stored = localStorage.getItem(key);
                if (!stored) return null;
                try { return atob(stored).replace(MewVault.salt, ""); } catch(e) { return null; }
            }
        };

        const APY = 0.07; // 7% из вашего Rust бэкенда
        const FEE_RATE = 0.025; // 2.5%

        // Инициализация данных
        let currentStaked = parseFloat(localStorage.getItem('mew_staked_balance')) || 0;
        updateUI();

        function calculateFee() {
            const val = parseFloat(document.getElementById('stake-input').value) || 0;
            const fee = val * FEE_RATE;
            document.getElementById('fee-value').innerText = `${fee.toFixed(2)} MEW`;
        }

        function updateUI() {
            document.getElementById('staked-amount').innerText = currentStaked.toFixed(2);
            const profit = currentStaked * APY;
            document.getElementById('yearly-profit').innerText = `+${profit.toFixed(2)} MEW`;
        }

        async function stake() {
            const input = document.getElementById('stake-input');
            const amount = parseFloat(input.value);

            if (!amount || amount <= 0) return alert("Введите корректную сумму");

            const netAmount = amount * (1 - FEE_RATE);
            
            // Здесь будет ваш запрос к бэкенду
            // const addr = MewVault.get('mew_address');
            // await fetch(`/stake/${addr}/${netAmount}`, { method: 'POST' });

            currentStaked += netAmount;
            localStorage.setItem('mew_staked_balance', currentStaked);
            
            input.value = '';
            calculateFee();
            updateUI();
            alert(`Успешно застейкано! Списано комиссии: ${(amount * FEE_RATE).toFixed(2)} MEW`);
        }

        function withdraw() {
            if (currentStaked <= 0) return alert("Нечего выводить");
            
            alert(`Вывод ${currentStaked.toFixed(2)} MEW инициирован. Средства поступят на основной баланс.`);
            currentStaked = 0;
            localStorage.setItem('mew_staked_balance', currentStaked);
            updateUI();
        }
    </script>
</body>
</html>
